<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MM Admin — Painel de Agendamentos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --white:#FFFFFF;
  --off:#F7F5F5;
  --rose-bg:#F9C8D0;
  --rose-light:#FDEEF0;
  --rose-mid:#E8A0AA;
  --rose-dark:#C97A88;
  --rose-deep:#A85A6A;
  --ink:#1A1A1A;
  --ink2:#3A3A3A;
  --muted:#666;
  --soft:#999;
  --border:#E8E8E8;
  --sidebar-w:230px;
  --green:#2D9E6B;
  --green-light:#E8F7F0;
  --amber:#C97A20;
  --amber-light:#FEF4E4;
  --red:#C94A4A;
  --red-light:#FDEAEA;
}

body{background:var(--off);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  min-height:100vh;position:fixed;left:0;top:0;bottom:0;
  z-index:100;
}
.sb-brand{
  padding:1.5rem 1.4rem 1.2rem;
  border-bottom:1px solid var(--border);
}
.sb-script{font-family:'Great Vibes',cursive;font-size:1.5rem;color:var(--ink);line-height:1.1;}
.sb-sub{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:1px;}
.sb-badge{
  display:inline-block;margin-top:6px;
  background:var(--rose-light);color:var(--rose-dark);
  border:1px solid var(--rose-mid);border-radius:20px;
  font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:2px 9px;font-weight:500;
}
.sb-nav{flex:1;padding:1rem 0;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 1.4rem;font-size:13px;color:var(--muted);
  cursor:pointer;transition:all .15s;border-left:2px solid transparent;
}
.sb-item:hover{color:var(--ink);background:var(--rose-light);}
.sb-item.active{color:var(--rose-dark);background:var(--rose-light);border-left-color:var(--rose-dark);font-weight:500;}
.sb-icon{font-size:15px;width:20px;text-align:center;}
.sb-footer{padding:1rem 1.4rem;border-top:1px solid var(--border);font-size:11px;color:var(--soft);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;font-weight:300;color:var(--ink);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.search-box{
  border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-size:12px;font-family:'Inter',sans-serif;
  color:var(--ink);background:var(--off);outline:none;width:200px;
  transition:border .2s;
}
.search-box:focus{border-color:var(--rose-mid);background:#fff;}
.search-box::placeholder{color:var(--soft);}
.btn-sm{
  border:none;border-radius:8px;padding:7px 14px;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;
  transition:all .2s;
}
.btn-rose{background:var(--rose-dark);color:#fff;}
.btn-rose:hover{background:var(--rose-deep);}
.btn-outline{background:#fff;color:var(--muted);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--rose-mid);color:var(--rose-dark);}

/* ── CONTENT ── */
.content{padding:2rem;flex:1;}

/* ── STATS CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:2rem;}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:1.2rem 1.3rem;
}
.stat-em{font-size:22px;margin-bottom:.5rem;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:var(--ink);line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
.stat-trend{font-size:10px;color:var(--green);margin-top:6px;font-weight:500;}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;font-weight:300;color:var(--ink);}
.filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-pill{
  padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:#fff;color:var(--muted);font-size:11px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;
}
.filter-pill.active{background:var(--rose-bg);color:var(--ink);border-color:var(--rose-mid);}

/* ── TABLE ── */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 16px #0000000a;}
table{width:100%;border-collapse:collapse;}
thead th{
  padding:11px 16px;text-align:left;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);background:var(--off);border-bottom:1px solid var(--border);
  font-weight:400;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--rose-light);}
tbody td{padding:13px 16px;font-size:13px;color:var(--ink2);}
.td-name{font-weight:500;color:var(--ink);}
.td-svc{font-size:12px;color:var(--muted);}
.td-phone{font-size:12px;}
.td-date{font-size:12px;}
.td-code{font-size:11px;color:var(--soft);letter-spacing:1px;font-weight:500;}

/* ── STATUS BADGE ── */
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.5px;}
.status-ok{background:var(--green-light);color:var(--green);}
.status-pend{background:var(--amber-light);color:var(--amber);}
.status-canc{background:var(--red-light);color:var(--red);}
.status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}

/* ── DETAIL PANEL ── */
.detail-panel{
  display:none;position:fixed;right:0;top:0;bottom:0;
  width:360px;background:#fff;border-left:1px solid var(--border);
  z-index:200;flex-direction:column;
  box-shadow:-4px 0 30px #0000001a;
}
.detail-panel.open{display:flex;}
.dp-header{
  padding:1.3rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.dp-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;}
.dp-close{background:none;border:1px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.dp-close:hover{border-color:var(--rose-mid);color:var(--rose-dark);}
.dp-body{flex:1;overflow-y:auto;padding:1.4rem 1.5rem;}
.dp-svc{background:var(--rose-light);border:1px solid var(--rose-mid);border-radius:12px;padding:1rem;margin-bottom:1.2rem;display:flex;gap:12px;align-items:center;}
.dp-icon{font-size:24px;}
.dp-svc-name{font-size:15px;font-weight:500;color:var(--ink);}
.dp-svc-price{font-size:13px;color:var(--rose-dark);}
.dp-rows{background:var(--off);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.2rem;}
.dp-row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.dp-row:last-child{border-bottom:none;}
.dp-lbl{color:var(--muted);}
.dp-val{font-weight:500;color:var(--ink);text-align:right;max-width:55%;}
.dp-actions{display:flex;flex-direction:column;gap:8px;}
.btn-full{width:100%;border:none;border-radius:10px;padding:11px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-green{background:var(--green-light);color:var(--green);}
.btn-green:hover{background:#c5eed9;}
.btn-amber{background:var(--amber-light);color:var(--amber);}
.btn-amber:hover{background:#fde8c0;}
.btn-red{background:var(--red-light);color:var(--red);}
.btn-red:hover{background:#f8d0d0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:3rem;color:var(--soft);}
.empty-em{font-size:2.5rem;margin-bottom:.5rem;}
.empty p{font-size:13px;}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:#0000004a;z-index:190;}
.overlay.open{display:block;}

/* ── MOBILE ── */
.mob-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;padding:4px;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .mob-toggle{display:block;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .content{padding:1.2rem;}
  .topbar{padding:0 1.2rem;}
  .search-box{width:140px;}
  table thead th:nth-child(3),table tbody td:nth-child(3),
  table thead th:nth-child(5),table tbody td:nth-child(5){display:none;}
  .detail-panel{width:100%;}
}
</style>
</head>
<body>

<!-- Overlay mobile -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-script">Mirian Marques</div>
    <div class="sb-sub">Beauty Studio</div>
    <span class="sb-badge">Admin</span>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" data-view="agenda" onclick="setView('agenda',this)">
      <span class="sb-icon">📅</span> Agendamentos
    </div>
    <div class="sb-item" data-view="clientes" onclick="setView('clientes',this)">
      <span class="sb-icon">👤</span> Clientes
    </div>
    <div class="sb-item" data-view="servicos" onclick="setView('servicos',this)">
      <span class="sb-icon">💅</span> Serviços
    </div>
    <div class="sb-item" data-view="hoje" onclick="setView('hoje',this)">
      <span class="sb-icon">⭐</span> Hoje
    </div>
  </div>
  <div class="sb-footer">Mirian Marques © 2026</div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="mob-toggle" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbar-title">Agendamentos</span>
    </div>
    <div class="topbar-right">
      <input class="search-box" id="search" placeholder="Buscar cliente ou serviço…" oninput="renderTable()">
      <button class="btn-sm btn-outline" onclick="seedDemo()">+ Demo</button>
      <button class="btn-sm btn-rose" onclick="exportCSV()">↓ Exportar</button>
    </div>
  </div>

  <div class="content" id="content">
    <!-- rendered by JS -->
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="dp-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="dp-header">
    <div class="dp-title">Detalhes</div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const STORAGE_KEY = 'mm_agendamentos';
const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const monthsShort = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const serviceMap = {
  manicure_gel:  {name:'Manicure em Gel',     icon:'💅', price:80,  cat:'Unhas'},
  pedicure_gel:  {name:'Pedicure em Gel',      icon:'🦶', price:90,  cat:'Unhas'},
  combo_gel:     {name:'Manicure + Pedicure',  icon:'💎', price:160, cat:'Unhas'},
  progressiva:   {name:'Progressiva',          icon:'✨', price:250, cat:'Cabelo'},
  botox:         {name:'Botox Capilar',        icon:'💆', price:200, cat:'Cabelo'},
  selagem:       {name:'Selagem',              icon:'🌿', price:180, cat:'Cabelo'},
  tratamento:    {name:'Tratamento Capilar',   icon:'🧴', price:120, cat:'Cabelo'},
  design_sb:     {name:'Design de Sobrancelhas',icon:'🪄',price:50,  cat:'Sobrancelha'},
  brow_lam:      {name:'Brow Lamination',      icon:'🌟', price:120, cat:'Sobrancelha'},
  lash_lifting:  {name:'Lash Lifting',         icon:'👁️', price:130, cat:'Lash'},
};

let currentView = 'agenda';
let currentFilter = 'todos';
let selectedId = null;

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── SEED DEMO DATA ────────────────────────────────────────────
function seedDemo() {
  const names = ['Ana Paula Silva','Camila Ferreira','Júlia Costa','Larissa Mendes','Beatriz Oliveira','Fernanda Lima','Tatiane Souza','Mariana Rocha','Priscila Alves','Renata Gomes'];
  const phones = ['(41) 99801-2345','(41) 98712-3456','(41) 97623-4567','(41) 96534-5678','(41) 95445-6789'];
  const svcs = Object.keys(serviceMap);
  const statuses = ['confirmado','confirmado','confirmado','pendente','cancelado'];
  const data = load();
  const today = new Date();

  for (let i = 0; i < 12; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + Math.floor(Math.random()*30) - 10);
    const svcId = svcs[Math.floor(Math.random()*svcs.length)];
    const code = 'MM' + (1000 + Math.floor(Math.random()*9000));
    data.push({
      id: Date.now() + i,
      code,
      name: names[Math.floor(Math.random()*names.length)],
      phone: phones[Math.floor(Math.random()*phones.length)],
      email: 'cliente@email.com',
      svc: svcId,
      day: d.getDate(),
      mo: d.getMonth(),
      yr: d.getFullYear(),
      time: ['09:00','10:00','11:00','13:00','14:00','15:00','16:00'][Math.floor(Math.random()*7)],
      obs: '',
      status: statuses[Math.floor(Math.random()*statuses.length)],
      createdAt: d.toISOString(),
    });
  }
  save(data);
  renderContent();
}

// ── STATUS ────────────────────────────────────────────────────
function statusBadge(s) {
  const map = {
    confirmado: ['status-ok','Confirmado'],
    pendente:   ['status-pend','Pendente'],
    cancelado:  ['status-canc','Cancelado'],
  };
  const [cls,lbl] = map[s] || map.pendente;
  return `<span class="status ${cls}">${lbl}</span>`;
}

function fmtDate(item) {
  return `${item.day} ${monthsShort[item.mo]} ${item.yr}`;
}

function isToday(item) {
  const t = new Date();
  return item.day===t.getDate() && item.mo===t.getMonth() && item.yr===t.getFullYear();
}

// ── VIEWS ─────────────────────────────────────────────────────
function setView(v, el) {
  currentView = v;
  currentFilter = 'todos';
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const titles = {agenda:'Agendamentos', clientes:'Clientes', servicos:'Serviços', hoje:'Hoje'};
  document.getElementById('topbar-title').textContent = titles[v];
  renderContent();
  closeSidebar();
}

function renderContent() {
  const el = document.getElementById('content');
  if(currentView==='agenda') el.innerHTML = viewAgenda();
  else if(currentView==='clientes') el.innerHTML = viewClientes();
  else if(currentView==='servicos') el.innerHTML = viewServicos();
  else if(currentView==='hoje') el.innerHTML = viewHoje();
  bindFilters();
}

// ── AGENDA VIEW ───────────────────────────────────────────────
function viewAgenda() {
  const data = load();
  const total = data.length;
  const confirmados = data.filter(x=>x.status==='confirmado').length;
  const pendentes = data.filter(x=>x.status==='pendente').length;
  const receita = data.filter(x=>x.status==='confirmado').reduce((a,x)=>{
    return a + (serviceMap[x.svc]?.price||0);
  },0);

  return `
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-em">📅</div>
      <div class="stat-val">${total}</div>
      <div class="stat-lbl">Agendamentos</div>
    </div>
    <div class="stat-card">
      <div class="stat-em">✅</div>
      <div class="stat-val">${confirmados}</div>
      <div class="stat-lbl">Confirmados</div>
    </div>
    <div class="stat-card">
      <div class="stat-em">⏳</div>
      <div class="stat-val">${pendentes}</div>
      <div class="stat-lbl">Pendentes</div>
    </div>
    <div class="stat-card">
      <div class="stat-em">💰</div>
      <div class="stat-val">R$${receita}</div>
      <div class="stat-lbl">Receita confirmada</div>
    </div>
  </div>
  <div class="sec-header">
    <div class="sec-title">Todos os agendamentos</div>
    <div class="filter-row">
      <button class="filter-pill ${currentFilter==='todos'?'active':''}" data-filter="todos">Todos</button>
      <button class="filter-pill ${currentFilter==='confirmado'?'active':''}" data-filter="confirmado">Confirmados</button>
      <button class="filter-pill ${currentFilter==='pendente'?'active':''}" data-filter="pendente">Pendentes</button>
      <button class="filter-pill ${currentFilter==='cancelado'?'active':''}" data-filter="cancelado">Cancelados</button>
    </div>
  </div>
  ${renderTable()}`;
}

function renderTable() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  let data = load();
  if(currentFilter!=='todos') data = data.filter(x=>x.status===currentFilter);
  if(q) data = data.filter(x=>
    x.name?.toLowerCase().includes(q) ||
    x.phone?.includes(q) ||
    (serviceMap[x.svc]?.name||'').toLowerCase().includes(q) ||
    x.code?.toLowerCase().includes(q)
  );
  // sort newest first
  data.sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));

  if(!data.length) return `<div class="table-wrap"><div class="empty"><div class="empty-em">🌸</div><p>Nenhum agendamento encontrado</p></div></div>`;

  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Cliente</th>
      <th>Serviço</th>
      <th>WhatsApp</th>
      <th>Data & Hora</th>
      <th>Cód.</th>
      <th>Status</th>
    </tr></thead>
    <tbody>
    ${data.map(item=>`
      <tr onclick="openDetail(${item.id})" style="cursor:pointer">
        <td class="td-name">${item.name||'—'}</td>
        <td><span class="td-svc">${serviceMap[item.svc]?.icon||''} ${serviceMap[item.svc]?.name||item.svc}</span></td>
        <td class="td-phone">${item.phone||'—'}</td>
        <td class="td-date">${fmtDate(item)} · ${item.time}</td>
        <td class="td-code">${item.code||'—'}</td>
        <td>${statusBadge(item.status||'pendente')}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── CLIENTES VIEW ─────────────────────────────────────────────
function viewClientes() {
  const data = load();
  const byClient = {};
  data.forEach(x=>{
    if(!byClient[x.phone]) byClient[x.phone] = {name:x.name,phone:x.phone,items:[],total:0};
    byClient[x.phone].items.push(x);
    if(x.status==='confirmado') byClient[x.phone].total += (serviceMap[x.svc]?.price||0);
  });
  const clients = Object.values(byClient).sort((a,b)=>b.items.length-a.items.length);

  if(!clients.length) return `<div class="table-wrap"><div class="empty"><div class="empty-em">👤</div><p>Nenhum cliente ainda</p></div></div>`;

  return `
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-em">👥</div>
      <div class="stat-val">${clients.length}</div>
      <div class="stat-lbl">Clientes únicos</div>
    </div>
    <div class="stat-card">
      <div class="stat-em">🔁</div>
      <div class="stat-val">${clients.filter(c=>c.items.length>1).length}</div>
      <div class="stat-lbl">Clientes recorrentes</div>
    </div>
  </div>
  <div class="sec-header"><div class="sec-title">Base de clientes</div></div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>Nome</th>
      <th>WhatsApp</th>
      <th>Agendamentos</th>
      <th>Gasto total</th>
    </tr></thead>
    <tbody>
    ${clients.map(c=>`
      <tr>
        <td class="td-name">${c.name||'—'}</td>
        <td class="td-phone">${c.phone||'—'}</td>
        <td><span class="status status-ok">${c.items.length} agendamento${c.items.length!==1?'s':''}</span></td>
        <td style="font-weight:500;color:var(--rose-dark)">R$ ${c.total}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── SERVIÇOS VIEW ─────────────────────────────────────────────
function viewServicos() {
  const data = load();
  const bySvc = {};
  data.forEach(x=>{
    if(!bySvc[x.svc]) bySvc[x.svc]={count:0,receita:0};
    bySvc[x.svc].count++;
    if(x.status==='confirmado') bySvc[x.svc].receita += (serviceMap[x.svc]?.price||0);
  });
  const svcs = Object.entries(serviceMap).sort((a,b)=>(bySvc[b[0]]?.count||0)-(bySvc[a[0]]?.count||0));

  return `
  <div class="sec-header"><div class="sec-title">Serviços mais agendados</div></div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th></th>
      <th>Serviço</th>
      <th>Categoria</th>
      <th>Agendamentos</th>
      <th>Receita</th>
      <th>Preço</th>
    </tr></thead>
    <tbody>
    ${svcs.map(([id,svc])=>`
      <tr>
        <td style="font-size:18px;width:40px">${svc.icon}</td>
        <td class="td-name">${svc.name}</td>
        <td><span class="td-svc">${svc.cat}</span></td>
        <td>${bySvc[id]?.count||0}</td>
        <td style="font-weight:500;color:var(--rose-dark)">R$ ${bySvc[id]?.receita||0}</td>
        <td style="color:var(--muted)">R$ ${svc.price}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── HOJE VIEW ─────────────────────────────────────────────────
function viewHoje() {
  const data = load().filter(isToday).sort((a,b)=>a.time.localeCompare(b.time));
  const hoje = new Date();
  const label = `${hoje.getDate()} de ${months[hoje.getMonth()]} de ${hoje.getFullYear()}`;

  return `
  <div class="sec-header">
    <div class="sec-title">Agenda de hoje — ${label}</div>
  </div>
  ${!data.length
    ? `<div class="table-wrap"><div class="empty"><div class="empty-em">☀️</div><p>Nenhum agendamento para hoje</p></div></div>`
    : `<div class="table-wrap"><table>
    <thead><tr>
      <th>Horário</th>
      <th>Cliente</th>
      <th>Serviço</th>
      <th>WhatsApp</th>
      <th>Status</th>
    </tr></thead>
    <tbody>
    ${data.map(item=>`
      <tr onclick="openDetail(${item.id})" style="cursor:pointer">
        <td style="font-weight:600;color:var(--rose-dark)">${item.time}</td>
        <td class="td-name">${item.name||'—'}</td>
        <td><span class="td-svc">${serviceMap[item.svc]?.icon||''} ${serviceMap[item.svc]?.name||item.svc}</span></td>
        <td class="td-phone">${item.phone||'—'}</td>
        <td>${statusBadge(item.status||'pendente')}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`}`;
}

// ── DETAIL PANEL ──────────────────────────────────────────────
function openDetail(id) {
  const data = load();
  const item = data.find(x=>x.id===id);
  if(!item) return;
  selectedId = id;
  const svc = serviceMap[item.svc]||{};
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-svc">
      <div class="dp-icon">${svc.icon||'💅'}</div>
      <div>
        <div class="dp-svc-name">${svc.name||item.svc}</div>
        <div class="dp-svc-price">R$ ${svc.price||'—'} · ${item.time}</div>
      </div>
    </div>
    <div class="dp-rows">
      <div class="dp-row"><span class="dp-lbl">Status</span><span class="dp-val">${statusBadge(item.status||'pendente')}</span></div>
      <div class="dp-row"><span class="dp-lbl">Código</span><span class="dp-val" style="letter-spacing:2px">${item.code||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Nome</span><span class="dp-val">${item.name||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">WhatsApp</span><span class="dp-val">${item.phone||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">E-mail</span><span class="dp-val">${item.email||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Data</span><span class="dp-val">${fmtDate(item)}</span></div>
      <div class="dp-row"><span class="dp-lbl">Horário</span><span class="dp-val">${item.time}</span></div>
      ${item.obs?`<div class="dp-row"><span class="dp-lbl">Obs.</span><span class="dp-val">${item.obs}</span></div>`:''}
    </div>
    <div class="dp-actions">
      <button class="btn-full btn-green" onclick="setStatus(${id},'confirmado')">✓ Confirmar agendamento</button>
      <button class="btn-full btn-amber" onclick="setStatus(${id},'pendente')">⏳ Marcar como pendente</button>
      <button class="btn-full btn-red"   onclick="setStatus(${id},'cancelado')">✕ Cancelar agendamento</button>
      <button class="btn-full btn-outline btn-sm" style="margin-top:4px" onclick="deleteItem(${id})">🗑 Remover registro</button>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('dp-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('dp-overlay').classList.remove('open');
}

function setStatus(id, status) {
  const data = load();
  const item = data.find(x=>x.id===id);
  if(item) { item.status=status; save(data); renderContent(); openDetail(id); }
}

function deleteItem(id) {
  if(!confirm('Remover este agendamento?')) return;
  const data = load().filter(x=>x.id!==id);
  save(data); closeDetail(); renderContent();
}

// ── FILTERS ───────────────────────────────────────────────────
function bindFilters() {
  document.querySelectorAll('.filter-pill').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentFilter = el.dataset.filter;
      document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      const tbl = document.querySelector('.table-wrap');
      if(tbl) tbl.outerHTML = renderTable();
      else renderContent();
    });
  });
}

// ── EXPORT CSV ────────────────────────────────────────────────
function exportCSV() {
  const data = load();
  const header = ['Código','Nome','WhatsApp','Email','Serviço','Data','Horário','Status','Observações'];
  const rows = data.map(x=>[
    x.code, x.name, x.phone, x.email,
    serviceMap[x.svc]?.name||x.svc,
    fmtDate(x), x.time, x.status||'pendente', x.obs||''
  ].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [header.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'agendamentos_mm.csv';
  a.click();
}

// ── SIDEBAR MOBILE ────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── INIT ──────────────────────────────────────────────────────
renderContent();
</script>
</body>
</html>
